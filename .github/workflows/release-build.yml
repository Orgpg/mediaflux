name: Build and Upload Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pyinstaller

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --add-data "config;config" --add-data "assets;assets" --add-data "platforms;platforms" --add-binary "tools\\ffmpeg\\bin;ffmpeg" app.py
          Rename-Item -Path dist\app.exe -NewName mediaflux-windows-x86_64.exe

      - name: Upload exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mediaflux-windows-x86_64.exe
          fail_on_unmatched_files: true
          name: ${{ github.event.release.name }}
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}

  build-linux:
    name: Build Linux binary (optional)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --noconfirm --onefile --add-data "config:config" --add-data "assets:assets" --add-data "platforms:platforms" app.py

      - name: Create tar.gz
        run: |
          mkdir -p release
          mv dist/app release/mediaflux-linux
          tar -czf release/mediaflux-linux.tar.gz -C release mediaflux-linux

      - name: Upload linux asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/mediaflux-linux.tar.gz
          fail_on_unmatched_files: true
          name: ${{ github.event.release.name }}
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
