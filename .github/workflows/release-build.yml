name: Build and Upload Release Assets

on:
  release:
    types: [published]

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pyinstaller

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --add-data "config;config" --add-data "assets;assets" --add-data "platforms;platforms" --add-binary "tools\\ffmpeg\\bin;ffmpeg" app.py

      - name: Upload exe to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/app.exe
          asset_name: mediaflux-windows-x86_64.exe
          asset_content_type: application/octet-stream

  build-linux:
    name: Build Linux binary (optional)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --noconfirm --onefile --add-data "config:config" --add-data "assets:assets" --add-data "platforms:platforms" app.py

      - name: Create tar.gz
        run: |
          mkdir -p release
          mv dist/app release/mediaflux-linux
          tar -czf release/mediaflux-linux.tar.gz -C release mediaflux-linux

      - name: Upload linux asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release/mediaflux-linux.tar.gz
          asset_name: mediaflux-linux.tar.gz
          asset_content_type: application/gzip
